name: VoiceMIDI
options:
  bundleIdPrefix: com.voicemidi
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  VoiceMIDI:
    type: application
    platform: macOS
    sources:
      - path: VoiceMIDI
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voicemidi.VoiceMIDI
        INFOPLIST_FILE: VoiceMIDI/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: VoiceMIDI-Bridging-Header.h
        CODE_SIGN_ENTITLEMENTS: VoiceMIDI/VoiceMIDI.entitlements
        GCC_OPTIMIZATION_LEVEL: "3"
        SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - sdk: CoreAudio.framework
      - sdk: CoreMIDI.framework
      - sdk: AVFoundation.framework
      - sdk: AudioToolbox.framework
